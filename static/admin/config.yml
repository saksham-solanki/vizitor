backend:
  name: git-gateway
  branch: main 

local_backend: true

publish_mode: simple
media_folder: "static/images/blog"
public_folder: "/images/blog"
show_preview_links: false

site_url: https://vizitor.netlify.app/

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      table: true

collections:
  - name: "blog"
    label: "Blog"
    folder: "content/blog"
    create: true
    editor:
      preview: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string"}
      - { label: "Date", name: "date", widget: "date" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false}
      - { label: "Summary", name: "summary", widget: "text", required: false}
      - { label: "Update", name: "update", widget: "text", required: false}
      - { label: "authors", name: "authors", widget: "list", allow_add: true, default: [""], required: false }
      - { label: "image", name: "image", widget: "image"}
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "help"
    label: "Help"
    folder: "content/help"
    create: true
    editor:
      preview: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string"}
      - { label: "Date", name: "date", widget: "date" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false}
      - { label: "Summary", name: "summary", widget: "text", required: false}
      - { label: "authors", name: "authors", widget: "list", allow_add: true, default: [""], required: false }
      - { label: "image", name: "image", widget: "image"}
      - { label: "Body", name: "body", widget: "markdown" }
