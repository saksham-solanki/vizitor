items:  
  - question: "What is Vizitor?"
    answer:   "Vizitor is a cloud-based hotel front desk software solution that simplifies operations, enhances guest experience, and increases revenue. It acts as a central hub for managing reservations, check-ins, check-outs, guest information, and more."
  - question: "How much does Vizitor cost?"
    answer: " Vizitor offers various pricing plans to fit your needs. Contact our sales team for a quote."
  - question: " Do I need a credit card to start a free trial?"
    answer: " No, you can start a 10-day free trial of Vizitor without a credit card."
  - question: "What are the different check-in options?"
    answer: " Vizitor offers mobile app check-in, QR code sign-in, and express checkout options."
  - question: " How does the ID badge integration work?"
    answer: " Vizitor integrates with ID badge printers to create and issue secure badges for guests and staff."
  - question: " What are the automation features?"
    answer: " Vizitor automates tasks like billing, invoicing, reporting, and email communication."
  - question: "Can I customize Vizitor to my hotel's needs?"
    answer: "Yes, Vizitor offers customization options to tailor the software to your specific requirements." 
  - question: "What data insights does Vizitor provide?"
    answer: " Vizitor provides real-time data and reports on occupancy rates, guest preferences, revenue performance, and more."
  - question: "What kind of support does Vizitor offer?"
    answer: "  Vizitor offers 24/7 support via phone, email, and chat."
  - question: "Can I get a demo of Vizitor?"
    answer: " Yes, please contact our sales team to schedule a demo."