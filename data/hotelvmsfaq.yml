items:  
  - question: "What is Vizitor and how does it help my hotel?"
    answer:  "Vizitor is an all-in-one digital guest management system designed for hotels. It streamlines check-ins, automates service flows, and enhances security through digital visitor IDs and NDA management. From boutique stays to multi-property operations, Vizitor helps reduce manual work and deliver a modern, seamless guest experience."
  - question: "Do guests need to download an app to use Vizitor?"
    answer: " Not at all. Vizitor runs through a mobile-friendly web app and integrates seamlessly with WhatsApp. Guests can check in, make service requests, and interact with your hotel using just their browser or messaging app, no downloads required."
  - question: " Can Vizitor handle pre-arrival check-ins and upsells?"
    answer: "Yes. Vizitor allows you to send branded, mobile check-in links to guests before they arrive. You can also promote upgrades, early check-in options, or exclusive offers, helping you unlock additional revenue even before guests step into your lobby."
  - question: "How does the digital visitor ID badge work?"
    answer: "Upon check-in, Vizitor generates a secure digital ID badge featuring the guest’s name, photo, and credentials. This can be used to manage access across various hotel zones (e.g., spa, lounge, meeting rooms) and helps staff easily identify verified guests."
  - question: "Can guests sign NDAs or legal forms through Vizitor?"
    answer: "Absolutely. Vizitor offers a built-in digital NDA feature. Guests or visitors can sign documents electronically from their phone or tablet, reducing paperwork while maintaining security and legal compliance, ideal for business travelers and VIPs."
  - question: "Does Vizitor integrate with my PMS or existing systems?"
    answer: " Yes. Vizitor supports integration with most major property management systems (PMS). This ensures guest data, booking details, and service requests stay synchronized, reducing data silos and manual entry."
  - question: "Is Vizitor secure and GDPR-compliant?"
    answer: "100%. Vizitor uses industry-standard encryption and secure cloud infrastructure to protect guest data. It complies with data privacy regulations like GDPR, ensuring your operations are both efficient and legally sound." 
  - question: "How long does it take to set up Vizitor at my hotel?"
    answer: "  Most properties can get up and running in less than 48 hours. Our onboarding team will guide you through every step, from configuration to staff training and integration."
  - question: "What kind of support do you offer?"
    answer: "We provide 24/7 customer support via email, chat, and phone. You'll also receive a dedicated success manager during onboarding to ensure your implementation is smooth and customized to your hotel’s needs."
  