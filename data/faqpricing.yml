items:  
  - question: "Is their any additional cost for installation etc.?"
    answer: "No, their is not additional cost of installation or any thing. All you need to pay for is your subscription nothing else."
  - question: "Can I install Vizitor on a tablet?"
    answer: "Yes, currently we are supporting all the major brand Android tablets and iPad to get you started with"
  - question: "Do I need any additional hardware to install vizitor?"
    answer: "You can get started with vizitor with almost any tablet you have handy with you. All you need to do is download the Vizitor App and get register."
  - question: "Can we print badges?"
    answer: "Yes, Vizitor allows you to prin customized badges with your logo and branding over it."
  - question: "Which printer does Vizitor support for badge printing?"
    answer: "Currently, Vizitor supports Brothers Label Printer QL 720 NW"
  - question: "What hardware does your app support?"
    answer: "Vizitor is available on both the Android(version 6+) and iOS(version 11+) platforms. You can use any tablet or iPad for starting out with our Visitor Management System at your reception."
  - question: "What are the subscription options available for Vizitor and how long do they last?"
    answer: "Vizitor offers both monthly and annual subscription plans for its users. There is no minimum term requirement, so you can choose the subscription that best fits your needs."
  - question: "What is the definition of a location in Vizitor?"
    answer: "In Vizitor, a location typically refers to a physical workplace where visitors come to sign in. Vizitor's Business and Enterprise plans offer multi-location management, which allows you to customize the sign-in process for each location and control settings from a centralized dashboard."
  - question: "What payment methods does Vizitor accept for online transactions?"
    answer: "Vizitor currently accepts various payment methods for online transactions, including credit and debit cards from Mastercard and Visa, as well as Net Banking and Wallets."
  - question: "What is the process for canceling my Vizitor subscription?"
    answer: "To cancel your Vizitor subscription, simply log in to your account and navigate to the Billing section. From there, you can select the Cancel Subscription option and follow the prompts to confirm your cancellation. Please note that your subscription will remain active until the end of your billing cycle."
    