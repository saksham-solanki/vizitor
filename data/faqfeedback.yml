items:  
  - question: "What is a visitor feedback system?"
    answer: "A visitor feedback system is a digital tool that lets guests share their opinions through quick ratings, comments, or surveys. Vizitor replaces paper forms with a touchless, cloud-based system that collects feedback in real time."
  - question: "Why is visitor feedback important for workplaces?"
    answer: "Visitor feedback helps businesses understand how guests feel, improve services, and build trust. With Vizitor, feedback is instant, organized, and actionable; helping you create a safer and more professional workplace."
  - question: "How does Vizitor collect feedback from visitors?"
    answer: "Vizitor collects feedback through star ratings, comment boxes, QR codes, or tablets at check-in/check-out. All responses are stored in a cloud dashboard where you can analyze trends and take action."
  - question: "Is visitor feedback data secure with Vizitor?"
    answer: "Yes, Vizitor stores all feedback in the cloud with GDPR-compliant data security, ensuring visitor information is safe and only accessible by authorized users."
  - question: "Who can benefit from using Vizitor’s feedback tool?"
    answer: "Vizitor is designed for corporate offices, healthcare facilities, educational institutions, hospitality, co-working spaces, and residential societies; any workplace that values visitor experience and safety."
