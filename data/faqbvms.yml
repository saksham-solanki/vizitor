  - question: "What is visitor management software? "
    answer: "This software streamlines how organizations handle guests. It digitizes sign-in, verifies identities, and grants access permissions through digital badges. Plus, it tracks activity and visitor trends for valuable insights."
    answer: "The free version of a management solution for guests usually comes with essential features like registration, check-in/out, and badge printing. Additionally, some of these solutions in their free plan may include extra capabilities like screening and reporting."
  - question: "How Does Contactless Check-In Work?"
    answer: " Contactless check-in allows visitors to register and check in without having to touch any physical surfaces. This can be done using a variety of methods, such as QR codes, Pre-invitation, or mobile apps."
  - question: "Is the app compatible with android devices? "
    answer: "Yes, most visitor management solutions are compatible with Android devices. You can check the app's description on the <a href='https://play.google.com/store/apps/details?id=com.vizitor.app&pli=1'> Google Play Store </a> to confirm compatibility."
  - question: " what are the feature do you have? "
    answer: "
    Visitor management software usually comes with several features, including <a href ='https://www.vizitorapp.com/visitor-registration-system/'> registration </a>, digital check-in/out, badge printing, screening, reporting, and tracking.
       To know more visit the <a href ='https://www.vizitorapp.com/features/'> feature page.</a>"
  - question: "What is 'employee association' on the dashboard? "
    answer: "The employee association feature on the dashboard allows you to associate visitors with specific employees. This can be helpful for tracking who is visiting your organization and for sending notifications to employees when their guests arrive."
  - question: " What is the Touchless Visitor Management System? "
    answer: "A touchless visitor management system is a system that allows visitors to register and check in without having to touch any physical surfaces. This is typically done using a combination of QR codes, touchless sign-in and mobile apps."
  - question: "What is the cost of visitor management software?  "
    answer: "The cost of visitor management software varies depending on the features and functionality that you need. However, there are many <a href ='https://www.vizitorapp.com/pricing/'> affordable visitor management </a> solutions available, even for small businesses."
  - question: "Do I need to train my employees on how to use a visitor management system? "
    answer: "Most visitor management systems are very easy to use. However, it is always a good idea to provide some basic training to your employees on how to use the system."
  