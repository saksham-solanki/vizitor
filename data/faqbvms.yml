  - question: "What is 'employee association' on the dashboard? "
    answer: "The employee association feature on the dashboard allows you to associate visitors with specific employees. This can be helpful for tracking who is visiting your organization and for sending notifications to employees when their guests arrive."
  - question: " What is the Touchless Visitor Management System? "
    answer: "A touchless visitor management system is a system that allows visitors to register and check in without having to touch any physical surfaces. This is typically done using a combination of QR codes, touchless sign-in and mobile apps."
  - question: "What is the cost of visitor management software?  "
    answer: "The cost of visitor management software varies depending on the features and functionality that you need. However, there are many <a href ='https://www.vizitorapp.com/pricing/'> affordable visitor management </a> solutions available, even for small businesses."
  - question: "Do I need to train my employees on how to use a visitor management system? "
    answer: "Most visitor management systems are very easy to use. However, it is always a good idea to provide some basic training to your employees on how to use the system."
  