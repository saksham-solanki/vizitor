items:  
  - question: "What is a touchless visitor management system?"
    answer: "A system that allows visitors to check-in digitally without touching any shared surfaces, ensuring safety and efficiency."
  - question: "How does Vizitor ensure safety?"
    answer: "Vizitor uses contactless check-ins, QR codes, automated photo ID, and optional health screening to maintain workplace safety."
  - question: "Can I pre-register visitors?"
    answer: "Yes, Hosts can pre-register visitors, who receive a QR code for a smooth, contactless check-in."
  - question: "Is visitor data secure?"
    answer: "Absolutely, Vizitor encrypts all data and complies with privacy regulations to keep information safe."
  - question: "Can I track visitor activity across multiple offices?"
    answer: "Yes. Vizitor’s cloud-based system lets you manage and monitor visitors across multiple locations from a single dashboard."
  - question: "What devices support Vizitor?"
    answer: "Vizitor works on iOS, Android, and desktop devices, making it versatile for any workplace."
  - question: "Does Vizitor print visitor badges?"
    answer: "Yes, Badges can be printed automatically upon check-in, including photo ID verification if needed."
  - question: "How do I get started?"
    answer: "Sign up on our website, set up your location, and start inviting visitors. Vizitor’s support team helps you every step of the way."