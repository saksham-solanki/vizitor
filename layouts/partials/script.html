<!-- functionality of click event of pricing -->

<script lazyload>
    // JavaScript for the pricing page

    let prices = {
        // monthly pricing for the different plans

        monthly: {
            inr: ['Rs.2,000 ', "Rs.4,000 "],
            usd: ["$45 ", "$90 "],
            eur: ["€45 ", "€90 "],
            gbp: ["£45 ", "£90 "]

        },
        // yearly pricing for the different plans

        yearly: {
            inr: ["Rs.1,600 ", "Rs.3,200 "],
            usd: ["$36 ", "$72 "],
            eur: ["€36 ", "€72 "],
            gbp: ["£36 ", "£72 "]
        },


    }


    function testOne() {
        document.querySelector(".switch").click();
        console.log(document.getElementById("toggle").checked)
    }

    document.addEventListener("DOMContentLoaded", function() {
        let yearlyToggle = document.querySelector(".yearlytoggle");
        let monthlyToggle = document.querySelector(".monthlyToggle");

        if (yearlyToggle) {
            yearlyToggle.onclick = testOne;
        }

        if (monthlyToggle) {
            monthlyToggle.onclick = testOne;
        }

        // Rest of your code...
    });

    // set pricing
    function setPricing(currency = 'inr', plan = 'monthly') {
        let basicPrice = 0,
            premiumPrice = 0;
        dayType = "";
        if (plan == 'monthly') {
            dayType = "per month*";
            BilledType = "Billed monthly"
            switch (currency) {
                case 'inr':
                    basicPrice = prices.monthly.inr[0];
                    premiumPrice = prices.monthly.inr[1];
                    break;
                case 'usd':
                    basicPrice = prices.monthly.usd[0];
                    premiumPrice = prices.monthly.usd[1];
                    break;
                case 'eur':
                    basicPrice = prices.monthly.eur[0];
                    premiumPrice = prices.monthly.eur[1];
                    break;
                case 'gbp':
                    basicPrice = prices.monthly.gbp[0];
                    premiumPrice = prices.monthly.gbp[1];
                    break;
            }
        } else if (plan == 'yearly') {
            dayType = "per month*";
            BilledType = "Billed yearly"
            switch (currency) {
                case 'inr':
                    basicPrice = prices.yearly.inr[0];
                    premiumPrice = prices.yearly.inr[1];
                    break;
                case 'usd':
                    basicPrice = prices.yearly.usd[0];
                    premiumPrice = prices.yearly.usd[1];
                    break;
                case 'eur':
                    basicPrice = prices.yearly.eur[0];
                    premiumPrice = prices.yearly.eur[1];
                    break;
                case 'gbp':
                    basicPrice = prices.yearly.gbp[0];
                    premiumPrice = prices.yearly.gbp[1];
                    break;
            }
        }
        updatePricing(basicPrice, premiumPrice, dayType, BilledType);
    }
    // Set the initial pricing to annual and INR
    let currentCurrency = 'inr';
    let currentPlan = 'yearly';

    function checkToggle(element) {
        // console.log('Agreement changed to ' + element.checked);
        if (element.checked) {
            currentPlan = 'yearly';
            setPricing(currentCurrency, currentPlan);
            // Remove the active class from the other button and add it to this button
            document.getElementById('monthly-btn').classList.remove('active');
            // this.classList.add('active');
        } else {
            currentPlan = 'monthly';
            setPricing(currentCurrency, currentPlan);
            // Remove the active class from the other button and add it to this button
            document.getElementById('yearly-btn').classList.remove('active');
            // this.classList.add('active');
        }
    }

    // Update the pricing on the page
    function updatePricing(basicPrice, premiumPrice, dayType, BilledType) {

        let startPriceElement = document.getElementById('start-price');
        if (startPriceElement) {
            startPriceElement.innerText = basicPrice;
        }

        let premiumPriceElement = document.getElementById('premium-price');
        if (premiumPriceElement) {
            premiumPriceElement.innerText = premiumPrice;
        }

        let dayTypeElement = document.getElementById('day-type');
        if (dayTypeElement) {
            dayTypeElement.innerText = dayType;
        }

        let dayTypePremiumElement = document.getElementById('day-type-premium');
        if (dayTypePremiumElement) {
            dayTypePremiumElement.innerText = dayType;
        }

        let dayMonthlyElement = document.getElementById('day-monthly');
        if (dayMonthlyElement) {
            dayMonthlyElement.innerText = BilledType;
        }

        let dayAnnuallyElement = document.getElementById('day-annually');
        if (dayAnnuallyElement) {
            dayAnnuallyElement.innerText = BilledType;
        }
    }

    // Toggle the pricing between yearly and monthly
    document.addEventListener("DOMContentLoaded", function() {

        let yearlyButton = document.getElementById('yearly-btn');
        let monthlyButton = document.getElementById('monthly-btn');
        let inrButton = document.getElementById('inr-btn');
        let usdButton = document.getElementById('usd-btn');
        let eurButton = document.getElementById('eur-btn');
        let gbpButton = document.getElementById('gbp-btn');


        // Toggle the currency between INR and USD EUR GBP
        if (yearlyButton) {
            yearlyButton.addEventListener('click', function() {
                currentPlan = 'yearly';
                setPricing(currentCurrency, currentPlan);
                // Remove the active class from the other button and add it to this button
                let monthlyButton = document.getElementById('monthly-btn');
                if (monthlyButton) {
                    monthlyButton.classList.remove('active');
                }
                this.classList.add('active');
            });
        }

        if (monthlyButton) {
            monthlyButton.addEventListener('click', function() {
                currentPlan = 'monthly';
                setPricing(currentCurrency, currentPlan);
                // Remove the active class from the other button and add it to this button
                let yearlyButton = document.getElementById('yearly-btn');
                if (yearlyButton) {
                    yearlyButton.classList.remove('active');
                }
                this.classList.add('active');
            });
        }

        if (inrButton) {
            inrButton.addEventListener('click', function() {
                currentCurrency = 'inr';
                setPricing(currentCurrency, currentPlan);
                // Remove the active class from the other button and add it to this button
                document.getElementById('usd-btn').classList.remove('active');
                this.classList.add('active');
                // currentCurrency = usdPrices;
            });
        }
        if (usdButton) {
            usdButton.addEventListener('click', function() {
                currentCurrency = 'usd';
                setPricing(currentCurrency, currentPlan);
                // Remove the active class from the other button and add it to this button
                document.getElementById('inr-btn').classList.remove('active');
                this.classList.add('active');
            });

        }

        if (eurButton) {
            eurButton.addEventListener('click', function() {
                currentCurrency = 'eur';
                setPricing(currentCurrency, currentPlan);
                // Remove the active class from the other button and add it to this button
                document.getElementById('inr-btn').classList.remove('active');
                this.classList.add('active');
            });

        }

        if (gbpButton) {
            gbpButton.addEventListener('click', function() {
                currentCurrency = 'gbp';
                setPricing(currentCurrency, currentPlan);
                // Remove the active class from the other button and add it to this button
                document.getElementById('inr-btn').classList.remove('active');
                this.classList.add('active');
            });

        }

        setPricing(currentCurrency, currentPlan);
    })
</script>

<script lazyload>
    $(function() {
        $("#contactForm").on("submit", function(event) {

            event.preventDefault();

            var countryCode = $("#country").val().split('-')[0].trim();
            var phoneNumber = $("#phoneNumber").val();

            // Check if the selected country is India
            if (countryCode === "+91" && phoneNumber.length > 10) {
                toastr.error("Phone number should not exceed 10 digits.");
                return;
            }

            var data = {
                name: $("#name").val(),
                email: $("#email").val(),
                phoneNumber: $("#country").val().split('-')[0].trim() + $("#phoneNumber").val(),
                country: $("#country").val().split('-')[1].trim(),
                message: $("#message").val(),
                companyName: $("#companyName").val(),

            }
            var contactForm = JSON.stringify(data)
            console.log("----data11----", data)
            $.ajax({
                url: "https://v2api.vizitorapp.com/v1/contact",
                headers: {
                    'Content-Type': 'application/json',
                },
                type: "post",
                data: contactForm,
                success: function(d) {
                    $('input[name=email]').val("")
                    $('input[name=name]').val("")
                    $('input[name=phoneNumber]').val("")
                    $('input[name=companyName]').val("")
                    $('textarea[name=message]').val("")
                    if (d) {
                        console.log("dddd--ddd---dd", d)
                        toastr.success(d.message);
                        window.location = "/contact-submitted";
                    }
                },
                error: function(e) {
                    console.log("eeee--eee---eee", e)
                    const errorMessage = e && e.responseJSON && e.responseJSON.message || 'Please try after some time.'
                    toastr.error(errorMessage);
                }
            });
        });
    })
</script>

<script lazyload>
    document.addEventListener('DOMContentLoaded', () => {
        const changeSelected = (e) => {
            let countryName = e.target.value.split("-")[1].replace(/^\s+|\s+$/gm, '');
            let countryCode = e.target.value.split("-")[0];
            document.getElementById("code").setAttribute("value", countryCode);
        };

        const countrySelect = document.querySelector('.countrySelect');
        if (countrySelect) {
            countrySelect.addEventListener('click', changeSelected);
        }
    });
</script>

<script>
    var TxtRotate = function(el, toRotate, period) {
        this.toRotate = toRotate;
        this.el = el;
        this.loopNum = 0;
        this.period = parseInt(period, 100) || 1000;
        this.txt = '';
        this.tick();
        this.isDeleting = false;
    };

    TxtRotate.prototype.tick = function() {
        var i = this.loopNum % this.toRotate.length;
        var fullTxt = this.toRotate[i];

        if (this.isDeleting) {
            this.txt = fullTxt.substring(0, this.txt.length - 1);
        } else {
            this.txt = fullTxt.substring(0, this.txt.length + 1);
        }

        this.el.innerHTML = '<span class="wrap">' + this.txt + '</span>';

        var that = this;
        var delta = 150 - Math.random() * 100;

        if (this.isDeleting) {
            delta /= 2;
        }

        if (!this.isDeleting && this.txt === fullTxt) {
            delta = this.period;
            this.isDeleting = true;
        } else if (this.isDeleting && this.txt === '') {
            this.isDeleting = false;
            this.loopNum++;
            delta = 500;
        }

        setTimeout(function() {
            that.tick();
        }, delta);
    };

    window.onload = function() {
        var elements = document.getElementsByClassName('txt-rotate');
        for (var i = 0; i < elements.length; i++) {
            var toRotate = elements[i].getAttribute('data-rotate');
            var period = elements[i].getAttribute('data-period');
            if (toRotate) {
                new TxtRotate(elements[i], JSON.parse(toRotate), period);
            }
        }
        // INJECT CSS
        var css = document.createElement("style");
        css.type = "text/css";
        css.innerHTML = ".txt-rotate > .wrap { border-right: 3px solid #ED5C18 }";
        document.body.appendChild(css);
    };
</script>

<script>
    jQuery('#gallery').carousel({
        interval: 5000
    })

    // Modify each slide to contain five columns of images
    jQuery('#gallery.carousel .carousel-item').each(function() {
        var minPerSlide = 4;
        var next = jQuery(this).next();
        if (!next.length) {
            next = jQuery(this).siblings(':first');
        }
        next.children(':first-child').clone().appendTo(jQuery(this));

        for (var i = 0; i < minPerSlide; i++) {
            next = next.next();
            if (!next.length) {
                next = jQuery(this).siblings(':first');
            }

            next.children(':first-child').clone().appendTo(jQuery(this));
        }
    });
    // Initialize carousel
    jQuery(".carousel-item:first-of-type").addClass("active");
    jQuery(".carousel-indicators:first-child").addClass("active");
</script>

<script>
    $(document).ready(function() {
        // Track whether the dropdown is open
        let isDropdownOpen = false;

        $('#productDropdown').on('click', function(e) {
            e.preventDefault();
            var $dropdownMenu = $('#productDropdownMenu');
            var $arrow = $('#dropdownArrow');

            if (isDropdownOpen) {
                // If the dropdown is open, close it
                $dropdownMenu.slideUp();
                $arrow.removeClass('open'); // Change arrow class or style to closed
                isDropdownOpen = false; // Update the state
            } else {
                // If the dropdown is closed, open it
                $dropdownMenu.slideDown();
                $arrow.addClass('open'); // Change arrow class or style to open
                isDropdownOpen = true; // Update the state

                // Close any other open dropdowns
                $('.dropdown-menu').not($dropdownMenu).slideUp();
                // Update other dropdown states
                isDropdownOpen = true;
            }
        });

        // Close the dropdown when clicking outside
        $(document).on('click', function(e) {
            if (!$(e.target).closest('#productDropdown, #productDropdownMenu').length) {
                $('#productDropdownMenu').slideUp();
                $('#dropdownArrow').removeClass('open'); // Reset the arrow to closed
                isDropdownOpen = false; // Update the state
            }
        });
    });
</script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const tocLinks = document.querySelectorAll("#toc a");
        const headings = document.querySelectorAll("h2, h3");

        const observer = new IntersectionObserver(
            (entries) => {
                entries.forEach((entry) => {
                    const id = entry.target.getAttribute("id");
                    if (entry.isIntersecting) {
                        tocLinks.forEach((link) => {
                            // Remove 'active' class from all links
                            link.classList.remove("active");

                            if (link.getAttribute("href") === `#${id}`) {
                                // Add 'active' class to the current link
                                link.classList.add("active");

                                // Expand parent `ul` for active `h3`
                                if (entry.target.tagName === "H3") {
                                    const parentUl = link.closest("ul");
                                    if (parentUl) parentUl.style.display = "block";
                                }

                                // Expand sub-items for active `h2`
                                if (entry.target.tagName === "H2") {
                                    document
                                        .querySelectorAll("#toc ul ul")
                                        .forEach((ul) => (ul.style.display = "none"));
                                    const subList = link.closest("li").querySelector("ul");
                                    if (subList) subList.style.display = "block";
                                }
                            }
                        });
                    }
                });
            }, {
                threshold: 0.6
            } // Adjust threshold for better visibility handling
        );

        headings.forEach((heading) => observer.observe(heading));
    });
</script>
