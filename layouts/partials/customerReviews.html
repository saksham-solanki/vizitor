<div class="container-fluid pb-5" id="clientscroll">
    <div class="customer-reviews slider">
        {{ range .Site.Data.customerReviews.items }}
        <div class="slide">
            <div class="card-deck ">
                <div class=" customReview phone-fast">
                    <div class="row card card-cut">

                        <div class="mt-3">
                            <p class="awesome">{{ .text }}</p>
                            <p class="heading">{{ .content }}</p>
                        </div>
                        <div class="d-flex justify-content-between card-name-designation mt-2">
                            <div class="d-flex flex-row align-items-center">
                                <div class="icon-ctm"><img src="{{ .image | absURL }}" alt="{{.brand}}"></div>
                                <div class="ms-2 c-details text1">
                                    <p class="mb-0"><b>{{ .name }}</b></p> <span>{{ .designation }}</span>
                                </div>
                            </div>
                        </div>

                    </div>


                </div>
            </div>
        </div>
        {{end}}
    </div>
</div>
