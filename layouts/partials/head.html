<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>{{ .Title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}" />
  <meta name="author" content="Gaurav Saini" />
  {{ hugo.Generator }}
  <!-- =====================================
       AUTOMATIC HREFLANG FOR ALL LANGUAGES
       ===================================== -->
  <!-- ✅ HREFLANG FIX -->

  <!-- ✅ Open Graph -->
  <meta property="og:title" content="{{ .Title }}" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:description"
    content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}" />
  <meta property="og:site_name" content="Vizitor - Visitor Management System" />
  <meta property="og:image" content="https://www.vizitorapp.com/images/vizitor/vizitor2.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  {{ if .IsHome }}<meta property="og:type" content="website" />{{ else }}<meta property="og:type" content="article" />{{ end }}
  <meta property="og:url" content="{{ .Permalink }}" />
  <meta property="article:modified_time" content="{{ now.Format "2006-01-02T15:04:05-07:00" }}" />

  <!-- ✅ Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@vizitorapp" />
  <meta name="twitter:title" content="{{ .Title }}" />
  <meta name="twitter:description"
    content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}" />
  <meta name="twitter:image" content="https://www.vizitorapp.com/images/vizitor/vizitor2.png" />


  <!-- ✅ Canonical & Robots -->
  <link rel="canonical" href="{{ .Permalink }}" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <link rel="shortcut icon" href="/images/vizitor/favicon.ico" type="image/x-icon" />
  <link rel='shortlink' href='https://www.vizitorapp.com/' />
  <meta http-equiv="Cache-Control" content="max-age=604800, must-revalidate, private" />

  <!-- ✅ Sitemap & Hreflang -->
  <link rel="sitemap" type="application/xml" title="Sitemap" href="https://www.vizitorapp.com/sitemap.xml" />
  <!-- <link rel="alternate" href="https://www.vizitorapp.com/" hreflang="en-us" />
  <link rel="alternate" href="https://www.vizitorapp.com/" hreflang="en-ca" />
  <link rel="alternate" href="https://www.vizitorapp.com/" hreflang="en-gb" />
  <meta property="og:locale:alternate" content="en_CA" />
  <meta property="og:locale:alternate" content="en_GB" /> -->

  <!-- ✅ Performance Boosters -->
  <!-- Preconnect (establish early connection to reduce latency) -->
  <link rel="preconnect" href="https://www.vizitorapp.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.vizitorapp.com">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.clarity.ms" crossorigin>
  <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>

  <!-- ✅ Design System + Critical CSS -->
  <style>
    :root {
      --vz-orange: #ED5C18;
      --vz-orange-dark: #d44e10;
      --vz-orange-light: #fff4ef;
      --vz-orange-glow: rgba(237, 92, 24, 0.15);
      --vz-navy: #0f172a;
      --vz-navy-light: #1e293b;
      --vz-slate: #475569;
      --vz-muted: #94a3b8;
      --vz-bg: #ffffff;
      --vz-bg-alt: #f8fafc;
      --vz-bg-warm: #fffbf7;
      --vz-border: #e2e8f0;
      --vz-font-display: 'Plus Jakarta Sans', 'Sofia-Pro-Semi-Bold', sans-serif;
      --vz-font-body: 'DM Sans', 'Poppins-Medium', sans-serif;
      --vz-radius: 16px;
      --vz-radius-sm: 10px;
      --vz-shadow-sm: 0 1px 3px rgba(15,23,42,0.04), 0 1px 2px rgba(15,23,42,0.06);
      --vz-shadow-md: 0 4px 16px rgba(15,23,42,0.06), 0 2px 6px rgba(15,23,42,0.04);
      --vz-shadow-lg: 0 12px 40px rgba(15,23,42,0.08), 0 4px 12px rgba(15,23,42,0.04);
      --vz-shadow-xl: 0 24px 64px rgba(15,23,42,0.1), 0 8px 20px rgba(15,23,42,0.06);
      --vz-transition: cubic-bezier(0.22, 1, 0.36, 1);
    }

    body {
      font-family: var(--vz-font-body);
      margin: 0;
      padding: 0;
      background: var(--vz-bg);
      color: var(--vz-slate);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    header, nav, .hero {
      min-height: 70px;
      visibility: visible;
    }

    /* Scroll-reveal animation system */
    .vz-reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.7s var(--vz-transition), transform 0.7s var(--vz-transition);
    }
    .vz-reveal.vz-visible {
      opacity: 1;
      transform: translateY(0);
    }
    .vz-reveal-delay-1 { transition-delay: 0.1s; }
    .vz-reveal-delay-2 { transition-delay: 0.2s; }
    .vz-reveal-delay-3 { transition-delay: 0.3s; }
    .vz-reveal-delay-4 { transition-delay: 0.4s; }

    /* Shared section label */
    .vz-section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--vz-font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--vz-orange);
      margin-bottom: 16px;
    }
    .vz-section-label::before {
      content: '';
      width: 24px;
      height: 2px;
      background: var(--vz-orange);
      border-radius: 2px;
    }

    /* Shared section heading */
    .vz-section-title {
      font-family: var(--vz-font-display);
      font-size: 40px;
      font-weight: 800;
      line-height: 1.15;
      color: var(--vz-navy);
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    .vz-section-subtitle {
      font-size: 18px;
      line-height: 1.6;
      color: var(--vz-muted);
      max-width: 560px;
      margin: 0 auto;
    }

    @media (max-width: 767px) {
      .vz-section-title { font-size: 28px; }
      .vz-section-subtitle { font-size: 16px; }
    }
  </style>
