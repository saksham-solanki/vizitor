  <script>
    fetch("https://ipapi.co/json/")
      .then(res => res.json())
      .then(data => {

        if (data.country_code !== "US") return;

        const path = window.location.pathname;

        // Agar already /us/ me hai → kuch mat karo
        if (path === "/us/" || path.startsWith("/us/")) return;

        // Homepage
        if (path === "/" || path === "") {
          window.location.replace("/us/");
          return;
        }

        // Inner pages → /us + path
        window.location.replace("/us" + path);

      })
      .catch(err => console.log("GeoIP error:", err));
  </script>
